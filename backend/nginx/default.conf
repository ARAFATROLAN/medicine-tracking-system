server {
    listen 80;
    server_name localhost;

    # Root directory of your Laravel public folder
    root /var/www/public;  # matches your Docker volume /var/www

    index index.php index.html;

    # Serve static files or route everything else to Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Forward all /api requests to Laravel (PHP-FPM)
    location /api/ {
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM handling
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass medicine_app:9000;  # Laravel container and PHP-FPM port
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Optional: handle favicon.ico and robots.txt
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
